# Название вашего пайплайна
name: Version update pipeline
on:
  pull_request:
    types: [closed]
    branches:
    - release

#global 
env:
  NAME_VERSION_FILE: version

jobs:
  validate-branch:
    runs-on: ubuntu-latest
    outputs:
      var1:  ${{ steps.next-step.outputs.var1 }}
    steps:
      - name: parse data
        id: parse-data
        uses: tj-actions/branch-names@v8
      
      - name: Print info about actions
        id: repo-info
        run: |
          echo "EVENT NAME    : ${{ github.event_name }}"
          echo "ACTION        : ${{ github.event.action }}"
          echo "EVENT NAME    : ${{ github.event_name }}"
          echo "IS            : ${{ github.event.pull_request.merged}}"
          echo "CURRENT BRANCH: ${{ steps.parse-data.outputs.current_branch }}"
          echo "REF           : ${{ github.ref }}" 
          echo "REF NAME      : ${{ github.ref_name }}"
          echo "DEFAULT BRANCH: ${{ steps.parse-data.outputs.default_branch }}"

      - name: validate branch 
        id: validate-branch
        if:  
          contains(steps.branch-names.outputs.current_branch,'feature') == false &&
          contains(steps.branch-names.outputs.current_branch,'hotfix') == false
        run: exit 1

      - name: next step 
        id: next-step
        run: | 
          echo "Current branch ${{steps.parse-data.ouputs._current_banch}}"
          echo "var1='var1value'" >> "$GITHUB_OUTPUT"

  second-job:
    needs: validate-branch
    runs-on: ubuntu-latest
      steps:
        - name: first step 
          id: job2-step1
          run: echo " ${{needs.validate-branch.outputs.var1}}"

